site_name: imgsync
site_description: Go + PostgreSQL 기반 파일 전송 작업 큐. 사내 NiFi 대체.
site_url: https://nineking424.github.io/imgsync/
repo_url: https://github.com/nineking424/imgsync
repo_name: nineking424/imgsync
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site
strict: true

# 사내 작업 산출물은 공개 사이트에서 제외
# runbook.md, e2e-manual-guide.md 는 Task 2 이후에 nav 로 통합될 예정이므로
# 부트스트랩 단계에서는 제외하여 --strict 빌드를 통과시킨다.
exclude_docs: |
  superpowers/
  README.md
  runbook.md
  e2e-manual-guide.md

theme:
  name: material
  language: ko
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - ko
        - en
  - mermaid2

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/nineking424/imgsync

nav:
  - 소개: index.md
