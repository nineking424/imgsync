name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Streaming guard
        run: bash scripts/check-streaming.sh

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.4.0

      - name: Test
        run: go test ./... -race -count=1
