apiVersion: v1
kind: Service
metadata:
  name: source-postgres
  namespace: imgsync-e2e
spec:
  selector:
    app: source-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: source-postgres
  namespace: imgsync-e2e
spec:
  replicas: 1
  selector:
    matchLabels:
      app: source-postgres
  template:
    metadata:
      labels:
        app: source-postgres
    spec:
      containers:
        - name: source-postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: source
            - name: POSTGRES_PASSWORD
              value: source
            - name: POSTGRES_DB
              value: source
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "source", "-d", "source"]
            periodSeconds: 1
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
