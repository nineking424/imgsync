replicaCount: 1

image:
  repository: imgsync
  tag: ""           # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Append additional volumes/volumeMounts to BOTH the worker Deployment and the
# sniffer Deployment. Used by e2e flows that need a shared filesystem (e.g.
# the real-cluster e2e mounts an NFS-backed PVC at /srv/imgsync). Production
# installs typically leave these empty.
extraVolumes: []
extraVolumeMounts: []

# Pre-existing Secret with the postgres DSN.
# Operator MUST create this Secret before installing the chart.
# Example:
#   kubectl create secret generic imgsync-dsn \
#     --from-literal=dsn='postgres://user:pw@host:5432/imgsync?sslmode=require'
dsnSecretRef:
  name: imgsync-dsn
  key: dsn

# Optional: pre-existing Secret with FTP credentials.
# If unset, FTP transports/sources will fail. Optional because some installs
# only use LocalFS.
ftpSecretRef:
  name: ""          # e.g. "imgsync-ftp"
  userKey: "user"
  passwordKey: "password"

# Worker runtime config (non-secret)
worker:
  workers: 4                  # goroutines per pod
  idleSleepMin: "50ms"
  idleSleepMax: "1s"
  ftpHostMaxConns: 8          # cluster-wide cap per host (advisory lock)
  ftpHostPoolMaxIdle: 5
  ftpHostPoolIdleTTL: "5m"

# Health & probes
health:
  port: 8080
  livenessProbe:
    httpGet:
      path: /livez
      port: health
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /readyz
      port: health
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 2
  startupProbe:
    httpGet:
      path: /readyz
      port: health
    periodSeconds: 2
    failureThreshold: 30      # 60s grace

# Pod-level
serviceAccount:
  create: true
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 65532
  runAsNonRoot: true
  runAsUser: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# PodDisruptionBudget — only rendered when replicaCount >= 2
pdb:
  maxUnavailable: 1

# Service — only exposes /healthz for monitoring; no app traffic
service:
  type: ClusterIP
  port: 8080

nodeSelector: {}
tolerations: []
affinity: {}

# Migration Job (Task 4) — knobs surfaced here, used by migrate-job.yaml
migrationJob:
  enabled: true
  backoffLimit: 2
  ttlSecondsAfterFinished: 600
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

sniffer:
  enabled: true
  replicas: 1   # v1: single sniffer pod, no advisory lock
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi
  config:
    sourceID: "main-source-db.images"
    table: "images"
    pkColumn: "id"
    tsColumn: "updated_at"
    extraColumns: "file_path"
    # values.yaml is loaded as plain YAML, not Helm-templated. Write Go template
    # syntax directly here — the sniffer's text/template engine renders these
    # against each row at runtime.
    dstPattern: "/incoming/{{.file_path}}"
    srcPattern: "src://images/{{.id}}"
    srcProtocol: "localfs"
    dstProtocol: "localfs"
    shadow: true
    batchSize: "500"
    biasSec: "5"
    intervalSec: "60"
  secrets:
    sourceDSNSecretRef: "imgsync-source-dsn"      # contains key SNIFFER_SOURCE_DSN
    imgsyncDSNSecretRef: "imgsync-db-dsn"         # contains key SNIFFER_IMGSYNC_DSN
