{{- if .Values.sniffer.enabled }}
{{- if gt (int .Values.sniffer.replicas) 1 }}
{{- fail "sniffer.replicas must be 1: v1 has no advisory lock on sniffer_state, so concurrent sniffers race the watermark and re-enqueue rows. Sniffer horizontal scaling is a v2 feature." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "imgsync.fullname" . }}-sniffer
  labels:
    {{- include "imgsync.labels" . | nindent 4 }}
    app.kubernetes.io/component: sniffer
spec:
  replicas: {{ .Values.sniffer.replicas }}
  strategy:
    type: Recreate   # never run two sniffers in parallel — v1 has no advisory lock on sniffer_state
  selector:
    matchLabels:
      {{- include "imgsync.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: sniffer
  template:
    metadata:
      annotations:
        # Force pod restart when the sniffer ConfigMap changes (envFrom reads
        # env at pod start — without this, helm upgrade updates the ConfigMap
        # but leaves the sniffer running with stale env values).
        checksum/sniffer-config: {{ include (print $.Template.BasePath "/sniffer-configmap.yaml") . | sha256sum }}
      labels:
        {{- include "imgsync.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: sniffer
    spec:
      containers:
        - name: sniffer
          image: {{ include "imgsync.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["sniffer"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "imgsync.fullname" . }}-sniffer
          env:
            - name: SNIFFER_SOURCE_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sniffer.secrets.sourceDSNSecretRef }}
                  key: SNIFFER_SOURCE_DSN
            - name: SNIFFER_IMGSYNC_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sniffer.secrets.imgsyncDSNSecretRef }}
                  key: SNIFFER_IMGSYNC_DSN
            - name: SNIFFER_HEALTH_ADDR
              value: ":8080"
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            failureThreshold: 30
          resources:
            {{- toYaml .Values.sniffer.resources | nindent 12 }}
          {{- with .Values.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
