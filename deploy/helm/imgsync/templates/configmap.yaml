apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "imgsync.fullname" . }}
  labels:
    {{- include "imgsync.labels" . | nindent 4 }}
data:
  IMGSYNC_WORKERS:            "{{ .Values.worker.workers }}"
  IMGSYNC_FTP_MAX_PER_HOST:   "{{ .Values.worker.ftpMaxPerHost }}"
  IMGSYNC_FTP_IDLE_TTL_SEC:   "{{ .Values.worker.ftpIdleTTLSec }}"
  IMGSYNC_FTP_NOOP_AFTER_SEC: "{{ .Values.worker.ftpNoopAfterSec }}"
  IMGSYNC_FTP_HOST_CAP:       "{{ .Values.worker.ftpHostCap }}"
  IMGSYNC_HEALTH_ADDR:        ":{{ .Values.health.port }}"
